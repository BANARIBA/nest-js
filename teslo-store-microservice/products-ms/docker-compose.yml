version: '3.8'

services:
  db:
    image: postgres:15
    container_name: products_microservice_db
    restart: always
    environment:
      POSTGRES_DB: ${PRODUCTS_MICROSERVICE_DBNAME}
      POSTGRES_USER: ${PRODUCTS_MICROSERVICE_USERNAME}
      POSTGRES_PASSWORD: ${PRODUCTS_MICROSERVICE_PASSWORD}
    ports:
      - "${PRODUCTS_MICROSERVICE_DBPORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: